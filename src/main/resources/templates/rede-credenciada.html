<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rede Credenciada - VidaPlus</title>
    
    <th:block th:replace="~{fragments/favicon :: icone}"></th:block>
    <link rel="stylesheet" th:href="@{/css/style.css}"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        .page-sheet { max-width: 1400px; margin: 30px auto; background: #fff; border-radius: 15px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); min-height: 80vh; }
        
        .network-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .btn-circle-back { width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #64748b; transition: 0.2s; border: 1px solid #e2e8f0; text-decoration: none; }
        .btn-circle-back:hover { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        
        /* Barra de Pesquisa Melhorada */
        .search-network { position: relative; width: 400px; }
        .search-network input { width: 100%; padding: 12px 20px 12px 45px; border-radius: 30px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 0.95rem; transition: 0.3s; }
        .search-network input:focus { border-color: var(--primary-color); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(32, 201, 151, 0.1); }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        /* Blocos de Cidade */
        .polo-row { border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 30px; transition: 0.3s; background: #fff; }
        
        .polo-title-bar { background: #f8fafc; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .city-name { font-size: 1.2rem; font-weight: 800; color: #334155; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        
        .clinics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); border-top: 1px solid #f1f5f9; }
        
        .clinic-item { 
            padding: 20px; border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; 
            background: white; position: relative; transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between;
        }
        .clinic-item:hover { background: #fafffd; z-index: 2; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .clinic-header { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 12px; }
        .clinic-icon { width: 42px; height: 42px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        
        /* Cores de ícones */
        .bg-icon-clinica { background: #dbeafe; color: #1e40af; }
        .bg-icon-lab { background: #fef9c3; color: #854d0e; }
        .bg-icon-hospital { background: #dcfce7; color: #166534; }
        .bg-icon-default { background: #f1f5f9; color: #64748b; }

        .clinic-name { font-weight: 700; color: #1e293b; font-size: 0.95rem; line-height: 1.3; margin-bottom: 3px; display: block; }
        .clinic-type { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; font-weight: 700; letter-spacing: 0.5px; }
        
        .clinic-details { font-size: 0.85rem; color: #475569; margin-top: 5px; }
        .detail-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
        .detail-row i { color: #94a3b8; margin-top: 3px; width: 14px; text-align: center; font-size: 0.8rem; }
        
        .btn-route { 
            align-self: flex-start; margin-top: 15px; color: var(--secondary-color); font-size: 0.8rem; font-weight: 600; 
            text-decoration: none; border: 1px solid #e2e8f0; padding: 6px 14px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s;
        }
        .btn-route:hover { background: var(--secondary-color); color: white; border-color: var(--secondary-color); }

        @media (max-width: 768px) {
            .clinics-grid { grid-template-columns: 1fr; }
            .network-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .search-network { width: 100%; }
        }
    </style>
</head>

<body>

    <div th:replace="~{fragments/header :: navbar}"></div>

    <main>
        <div class="page-sheet">
            
            <div class="network-header">
                <div>
                    <div style="display:flex; align-items:center; gap:15px; margin-bottom:5px;">
                        <a href="/home" class="btn-circle-back" title="Voltar"><i class="fas fa-arrow-left"></i></a>
                        <h2 style="margin:0; color: #2c3e50;">Rede Credenciada</h2>
                    </div>
                    <p style="color: #64748b; margin: 5px 0 0 0;">
                        Exibindo <strong th:text="${totalUnidades}">0</strong> unidades parceiras em todo o Brasil.
                    </p>
                </div>
                <div class="search-network">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="filtroRede" oninput="filtrarRede()" placeholder="Buscar por cidade, bairro ou clínica...">
                </div>
            </div>

            <div th:if="${#maps.isEmpty(redePorCidade)}" class="text-center py-5">
                <i class="fas fa-map-marked-alt fa-3x text-muted mb-3 opacity-50"></i>
                <h4 class="text-muted">Nenhuma unidade encontrada na base de dados.</h4>
            </div>

            <div id="lista-cidades">
                <div th:each="entry : ${redePorCidade}" class="city-block" th:data-city="${entry.key}">
                    
                    <div class="polo-row">
                        <div class="polo-title-bar">
                            <div class="city-name">
                                <i class="fas fa-map-marker-alt" style="color: #ef4444;"></i> 
                                <span th:text="${entry.key}">CIDADE</span>
                            </div>
                            <span class="badge bg-white text-dark border shadow-sm">
                                <i class="fas fa-building me-1 text-muted"></i> 
                                <span th:text="${#lists.size(entry.value)}">0</span> Locais
                            </span>
                        </div>
                        
                        <div class="clinics-grid">
                            <div th:each="u : ${entry.value}" class="clinic-item" 
                                 th:data-name="${u.nome}" 
                                 th:data-bairro="${u.bairro}">
                                
                                <div>
                                    <div class="clinic-header">
                                        <div class="clinic-icon" 
                                             th:classappend="${#strings.containsIgnoreCase(u.tipo, 'CLINICA') ? 'bg-icon-clinica' : 
                                                              (#strings.containsIgnoreCase(u.tipo, 'LAB') ? 'bg-icon-lab' : 
                                                              (#strings.containsIgnoreCase(u.tipo, 'HOSPITAL') ? 'bg-icon-hospital' : 'bg-icon-default'))}">
                                            
                                            <i class="fas" 
                                               th:classappend="${#strings.containsIgnoreCase(u.tipo, 'CLINICA') ? 'fa-user-md' : 
                                                                (#strings.containsIgnoreCase(u.tipo, 'LAB') ? 'fa-flask' : 
                                                                (#strings.containsIgnoreCase(u.tipo, 'HOSPITAL') ? 'fa-hospital' : 'fa-clinic-medical'))}"></i>
                                        </div>
                                        
                                        <div>
                                            <span class="clinic-name" th:text="${u.nome}">Nome</span>
                                            <span class="clinic-type" th:text="${u.tipo}">TIPO</span>
                                        </div>
                                    </div>

                                    <div class="clinic-details">
                                        <div class="detail-row">
                                            <i class="fas fa-map-pin"></i> 
                                            <span>
                                                <span th:if="${u.logradouro != null && !#strings.isEmpty(u.logradouro)}" th:text="${u.logradouro} + ', '"></span>
                                                <strong th:text="${u.bairro}">Bairro</strong>
                                            </span>
                                        </div>
                                        
                                        <div class="detail-row" th:if="${u.horarioFuncionamento != null}">
                                            <i class="fas fa-clock"></i> 
                                            <span th:text="${u.horarioFuncionamento}">08:00 - 18:00</span>
                                        </div>
                                    </div>
                                </div>

                                <a href="#" class="btn-route" title="Ver no Mapa">
                                    <i class="fas fa-directions"></i> Ver Rota
                                </a>

                            </div> 
                        </div>
                    </div>
                </div>
            </div>

            <div id="msg-sem-resultados" class="text-center py-5" style="display: none;">
                <i class="fas fa-search fa-3x text-muted mb-3 opacity-50"></i>
                <h4 class="text-muted">Nenhum resultado para sua busca.</h4>
            </div>

        </div>
    </main>

    <div th:replace="~{fragments/footer :: rodape}"></div>

    <script>
        // Função para normalizar texto (remove acentos e põe minúsculo)
        function normalizeText(text) {
            return text.normalize('NFD').replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        function filtrarRede() {
            let inputRaw = document.getElementById('filtroRede').value;
            let input = normalizeText(inputRaw);
            
            let cityBlocks = document.getElementsByClassName('city-block');
            let foundAny = false;

            for (let i = 0; i < cityBlocks.length; i++) {
                let cityRaw = cityBlocks[i].getAttribute('data-city') || "";
                let city = normalizeText(cityRaw);
                
                let clinics = cityBlocks[i].getElementsByClassName('clinic-item');
                let foundInCity = false;

                // Se a cidade bater com a busca, mostra a cidade e TODAS as clínicas
                if (city.includes(input)) {
                    cityBlocks[i].style.display = ""; // Mostra cidade
                    for (let j = 0; j < clinics.length; j++) {
                        clinics[j].style.display = ""; // Mostra clínica
                    }
                    foundAny = true;
                    continue; // Pula para a próxima cidade
                }

                // Se a cidade não bater, procura nas clínicas internas
                for (let j = 0; j < clinics.length; j++) {
                    let nameRaw = clinics[j].getAttribute('data-name') || "";
                    let bairroRaw = clinics[j].getAttribute('data-bairro') || "";
                    
                    let name = normalizeText(nameRaw);
                    let bairro = normalizeText(bairroRaw);
                    
                    if (name.includes(input) || bairro.includes(input)) {
                        clinics[j].style.display = ""; // Mostra clínica específica
                        foundInCity = true;
                    } else {
                        clinics[j].style.display = "none"; // Esconde clínica
                    }
                }

                // Decide se mostra o bloco da cidade
                if (foundInCity) {
                    cityBlocks[i].style.display = "";
                    foundAny = true;
                } else {
                    cityBlocks[i].style.display = "none";
                }
            }

            // Exibe mensagem se não achou nada
            let msg = document.getElementById('msg-sem-resultados');
            if (msg) {
                msg.style.display = foundAny ? "none" : "block";
            }
        }
    </script>

</body>
</html>
