<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha - TechxMicro</title>
    <th:block th:replace="~{fragments/favicon :: icone}"></th:block>
    <link rel="stylesheet" th:href="@{/css/global.css?v=1.2}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- Cabeçalho Fixo Isolado (Sem o botão Home) --- */
        .custom-navbar {
            background-color: #000000;
            padding: 15px 30px;
            border-bottom: 2px solid #008436;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between; /* Mantém a logo na esquerda e a sessão na direita */
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
            z-index: 1000;
            width: 100%;
            box-sizing: border-box;
        }

        .custom-navbar .logo a {
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        /* Hover customizado para o botão sair */
        .btn-logout-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #008436 !important;
        }

        /* --- Layout da Página --- */
        main { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 40px 20px;
        }
        
        /* O FORMULÁRIO PRETO (BLACK CARD) */
        .login-container {
            background: #000000 !important;
            border-radius: 20px;
            border-top: 5px solid var(--tm-dark-green);
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            border-bottom: 1px solid #333;
            width: 100%;
            max-width: 450px;
            padding: 45px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .login-header h2 {
            color: var(--tm-dark-green) !important;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #bbbbbb;
            font-size: 0.95rem;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--tm-light-green) !important;
        }

        .form-control-custom {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-control-custom:focus {
            border-color: var(--tm-light-green);
            background: #000;
        }

        .btn-recovery {
            background-color: var(--tm-dark-green);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-recovery:hover {
            background-color: var(--tm-light-green);
            color: var(--tm-black);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(172, 254, 159, 0.2);
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        .login-footer a {
            color: var(--tm-light-green);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .login-footer a:hover {
            color: white;
            text-shadow: 0 0 5px var(--tm-light-green);
        }
    </style>
</head>
<body style="background-color: #121212; color: #ffffff; display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <nav class="custom-navbar">
        <div class="logo">
            <a th:href="@{/home}">
                <img th:src="@{/img/LogoSite.png}" alt="TechxMicro" style="height: 35px;">
            </a>
        </div>
        
        <div style="display: flex; align-items: center; gap: 25px;">
            <span style="color: #ffffff; font-size: 1rem; font-weight: 500;">
                Olá, <strong th:text="${(usuario != null and usuario.id != null) ? usuario.nome : ((paciente != null and paciente.id != null) ? paciente.nome : 'Visitante')}" style="color: #008436; font-weight: 800;">Visitante</strong>
            </span>

            <a th:href="@{/logout}" class="btn-logout-custom" style="text-decoration: none; color: #ffffff; font-weight: 600; border: 1px solid #555; padding: 8px 25px; border-radius: 50px; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-sign-out-alt" style="color: #008436;"></i> Sair
            </a>
        </div>
    </nav>

    <main>
        <div class="login-container">
            <div class="login-header">
                <h2>Recuperar Acesso</h2>
                <p>
                    Informe seu e-mail corporativo. <br>
                    Enviaremos uma chave de segurança TechxMicro.
                </p>
            </div>

            <div th:if="${error}" class="alert-erro" style="background: rgba(62, 39, 35, 0.5); color: #ffccbc; padding: 12px; margin-bottom: 20px; text-align: center; border-radius: 8px; border: 1px solid var(--tm-brown); font-weight: 600;">
                <i class="fas fa-lock"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label">E-mail de Login</label>
                    <input type="email" name="email" class="form-control-custom" placeholder="colaborador@techxmicro.com.br" required>
                </div>
                
                <button type="submit" class="btn-recovery">
                    SOLICITAR CÓDIGO <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <div class="login-footer">
                <a th:href="@{/login}">
                    <i class="fas fa-arrow-left"></i> Voltar para o Login
                </a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: rodape}"></div>
</body>
</html>
