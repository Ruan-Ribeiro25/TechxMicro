<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - PIXEL TI Helpdesk</title>
    <th:block th:replace="~{fragments/favicon :: icone}"></th:block>
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <div th:replace="~{fragments/header :: navbar}"></div>

    <main>
        <div class="login-container" style="width: 100%; max-width: 600px; padding: 30px;">
            <div class="login-header" style="text-align: center;">
                <h2 style="color: #b6d441;">Criar Conta</h2>
                <p>Preencha os seus dados para aceder ao Helpdesk</p>
            </div>

            <div th:if="${error}" class="alert-erro" style="background:#fdecea; color:#f07d35; padding:10px; text-align:center; margin-bottom:15px; border-radius:5px; border: 1px solid #f07d35;">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" th:object="${usuario}" method="post">
                
                <h4 style="color: #000000; margin: 15px 0 10px 0; border-bottom: 2px solid #b6d441; padding-bottom: 5px;">Dados Pessoais</h4>

                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" th:field="*{nome}" class="form-control" placeholder="Seu nome completo" required autofocus>
                </div>

                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label>Data de Nascimento</label>
                        <input type="date" th:field="*{dataNascimento}" class="form-control" required>
                    </div>
                    <div>
                        <label>Celular / WhatsApp</label>
                        <input type="text" th:field="*{telefone}" id="telefone" class="form-control" placeholder="(00) 90000-0000" maxlength="15" required>
                    </div>
                </div>

                <h4 style="color: #000000; margin: 25px 0 10px 0; border-bottom: 2px solid #b6d441; padding-bottom: 5px;">Endereço</h4>
                
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px;">
                    <div>
                        <label>CEP</label>
                        <input type="text" th:field="*{cep}" id="cep" class="form-control" placeholder="00000-000" maxlength="9" required>
                    </div>
                    <div>
                        <label>Cidade</label>
                        <input type="text" th:field="*{cidade}" id="cidade" class="form-control" placeholder="Automático..." readonly required>
                    </div>
                    <div>
                        <label>UF</label>
                        <input type="text" th:field="*{uf}" id="uf" class="form-control" placeholder="UF" readonly required>
                    </div>
                </div>

                <div class="form-group" style="display: grid; grid-template-columns: 3fr 1fr; gap: 10px;">
                    <div>
                        <label>Logradouro</label>
                        <input type="text" th:field="*{logradouro}" id="logradouro" class="form-control" placeholder="Preenchimento automático..." required>
                    </div>
                    <div>
                        <label>Número</label>
                        <input type="text" th:field="*{numero}" class="form-control" placeholder="123" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" th:field="*{bairro}" id="bairro" class="form-control" placeholder="Preenchimento automático..." required>
                </div>

                <h4 style="color: #000000; margin: 25px 0 10px 0; border-bottom: 2px solid #b6d441; padding-bottom: 5px;">Acesso de Login</h4>

                <div class="form-group">
                    <label>E-mail (Será sua chave de acesso)</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" th:field="*{senha}" id="senha" class="form-control" onkeyup="validarSenha()" placeholder="Mínimo 8 caracteres" required>
                    <div id="password-requirements" class="password-req">
                        <div id="req-length" class="req-item"><i class="fas fa-times"></i> Mínimo 8 caracteres</div>
                        <div id="req-upper" class="req-item"><i class="fas fa-times"></i> Letra Maiúscula</div>
                        <div id="req-number" class="req-item"><i class="fas fa-times"></i> Número</div>
                        <div id="req-special" class="req-item"><i class="fas fa-times"></i> Símbolo Especial</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" name="confirmarSenha" id="confirmarSenha" class="form-control" onkeyup="validarConfirmacao()" placeholder="Repita a senha" required>
                    <small id="msgConfirmacao" style="display:none; font-weight:bold; margin-top:5px;"></small>
                </div>

                <button type="submit" id="btnRegistrar" class="btn-custom" disabled style="width:100%; padding:15px; background:#b6d441; color:#000000; font-weight: 800; border:none; border-radius:5px; margin-top:10px; opacity:0.6; cursor:not-allowed; transition: 0.3s;">
                    Finalizar Cadastro
                </button>
            </form>

            <div class="login-footer" style="text-align: center; margin-top: 15px;">
                <a th:href="@{/login}" style="color: #f07d35; font-weight: bold;">Já tenho conta. Fazer Login.</a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: rodape}"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        $(document).ready(function() {
            // MÁSCARA CELULAR
            $('#telefone').on('input', function() {
                var v = $(this).val().replace(/\D/g,'');
                v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
                v = v.replace(/(\d)(\d{4})$/,"$1-$2");
                $(this).val(v);
            });

            // MÁSCARA CEP
            $('#cep').on('input', function() {
                var v = $(this).val().replace(/\D/g,'');
                v = v.replace(/^(\d{5})(\d)/,"$1-$2");
                $(this).val(v);
            });

            // INTEGRAÇÃO BRASIL API COM O CAMPO UF INCLUÍDO
            $('#cep').blur(function() {
                var cep = $(this).val().replace(/\D/g, '');
                
                if (cep.length === 8) {
                    $('#logradouro').val('Buscando...');
                    $('#bairro').val('Buscando...');
                    $('#cidade').val('Buscando...');
                    $('#uf').val('...'); 
                    
                    $.getJSON(`https://brasilapi.com.br/api/cep/v1/${cep}`)
                    .done(function(dados) {
                        $('#logradouro').val(dados.street || '');
                        $('#bairro').val(dados.neighborhood || '');
                        $('#cidade').val(dados.city || '');
                        $('#uf').val(dados.state || ''); // Preenche o UF automático
                        $('input[name="numero"]').focus();
                    })
                    .fail(function() {
                        alert("CEP não encontrado. Preencha manualmente.");
                        $('#logradouro, #bairro, #cidade, #uf').val('');
                        $('#cidade, #uf').prop('readonly', false);
                        $('#logradouro').focus();
                    });
                }
            });
        });

        // Validações de Senha mantidas conforme seu código original
        function validarSenha() {
            const senha = document.getElementById('senha').value;
            document.getElementById('password-requirements').style.display = 'block';
            updateItem('req-length', senha.length >= 8);
            updateItem('req-upper', /[A-Z]/.test(senha));
            updateItem('req-number', /[0-9]/.test(senha));
            updateItem('req-special', /[@#$%^&+=!_.*-]/.test(senha));
            validarConfirmacao();
        }
        function updateItem(id, valid) {
            const el = document.getElementById(id);
            if (valid) {
                el.classList.add('valid');
                el.innerHTML = '<i class="fas fa-check" style="color: #b6d441;"></i> ' + el.innerText.trim();
                el.style.color = '#b6d441';
            } else {
                el.classList.remove('valid');
                el.innerHTML = '<i class="fas fa-times" style="color: #f07d35;"></i> ' + el.innerText.trim();
                el.style.color = '#666';
            }
        }
        function validarConfirmacao() {
            const senha = document.getElementById('senha').value;
            const confirmacao = document.getElementById('confirmarSenha').value;
            const msg = document.getElementById('msgConfirmacao');
            const btn = document.getElementById('btnRegistrar');
            const senhasIguais = (senha === confirmacao) && senha.length > 0;
            const regrasOk = document.querySelectorAll('.req-item.valid').length >= 4;

            if (confirmacao.length > 0) {
                msg.style.display = 'block';
                if (senhasIguais) { msg.style.color = '#b6d441'; msg.innerText = 'Senhas conferem'; }
                else { msg.style.color = '#f07d35'; msg.innerText = 'Senhas não conferem'; }
            }
            if (senhasIguais && regrasOk) {
                btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
            } else {
                btn.disabled = true; btn.style.opacity = '0.6'; btn.style.cursor = 'not-allowed';
            }
        }
    </script>
</body>
</html>
