<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Meus Agendamentos - VidaPlus</title>
    <th:block th:replace="~{fragments/favicon :: icone}"></th:block>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/agendamentos.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <div th:replace="~{fragments/header :: navbar}"></div>

    <main>
        <div class="page-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <a th:href="@{/pacientes}" title="Voltar" style="color: white; font-size: 1.4rem; text-decoration: none; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h2 style="margin: 0; color: white;">Meus Agendamentos</h2>
            </div>
            
            <div style="display: flex; gap: 15px; align-items: center;">
                <button type="button" class="btn-notif" data-bs-toggle="modal" data-bs-target="#modalNotificacoes">
                    <i class="fas fa-bell"></i>
                    <span class="badge-notif" th:if="${qtdNotificacoes > 0}" th:text="${qtdNotificacoes}">0</span>
                </button>
                
                <a th:href="@{/agendamentos/novo}" class="btn-novo">
                    <i class="fas fa-plus"></i> Novo Agendamento
                </a>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert-msg alert-sucesso">
            <i class="fas fa-check-circle"></i> <span th:text="${sucesso}"></span>
        </div>
        <div th:if="${erro}" class="alert-msg alert-erro">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${erro}"></span>
        </div>

        <div th:if="${#lists.isEmpty(agendamentos)}" style="text-align:center; padding: 50px; background: white; border-radius: 12px; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.03);">
            <i class="far fa-calendar-times" style="font-size: 4rem; color: #ddd; margin-bottom: 15px;"></i>
            <p style="color:#888; font-size: 1.1rem;">Nenhuma consulta encontrada no momento.</p>
        </div>

        <div class="agenda-grid">
            <div th:each="agenda : ${agendamentos}" 
                 th:class="'agenda-card card-' + ${agenda.status}">
                
                <div class="card-top">
                    <div class="proc-info">
                        <h3 th:text="${agenda.procedimento}">Consulta Geral</h3>
                        <p><i class="fas fa-user-md"></i> <span th:text="${agenda.profissional}">Dr. Nome</span></p>
                    </div>
                    
                    <div class="date-box">
                        <span class="date-day" th:text="${#temporals.format(agenda.dataHora, 'dd')}">01</span>
                        <span class="date-month" th:text="${#temporals.format(agenda.dataHora, 'MMM')}">JAN</span>
                    </div>
                </div>

                <div class="card-bottom">
                    <div class="time-badge">
                        <i class="far fa-clock"></i> 
                        <span th:text="${#temporals.format(agenda.dataHora, 'HH:mm')}">00:00</span>
                    </div>
                    
                    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                        <form th:if="${agenda.status == 'Agendado' or agenda.status == 'AGENDADO'}" 
                              th:action="@{/agendamentos/cancelar}" method="post"
                              onsubmit="return confirm('Tem certeza que deseja cancelar esta consulta?');"
                              style="margin: 0;">
                            <input type="hidden" name="id" th:value="${agenda.id}">
                            <button type="submit" class="btn-cancel" title="Cancelar Consulta">
                                <i class="fas fa-times"></i> Cancelar
                            </button>
                        </form>

                        <span th:class="'status-pill pill-' + ${agenda.status}" th:text="${agenda.status}">Agendado</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div class="modal fade" id="modalNotificacoes" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm"> <div class="modal-content modal-content-custom">
                <div class="modal-header-custom">
                    <h5 class="modal-title"><i class="fas fa-bell me-2"></i>Notificações</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body-custom">
                    <ul class="notif-list" th:if="${notificacoes != null}">
                        <li th:each="msg : ${notificacoes}" class="notif-item">
                            <i class="fas fa-info-circle"></i>
                            <span th:text="${msg}">Mensagem</span>
                        </li>
                    </ul>
                    <div th:if="${notificacoes == null or #lists.isEmpty(notificacoes)}" class="text-center p-4 text-muted">
                        <i class="far fa-bell-slash fa-2x mb-2" style="opacity: 0.3;"></i><br>
                        Nenhuma notificação nova.
                    </div>
                </div>
                <div class="modal-footer-custom">
                    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: rodape}"></div>

</body>
</html>
