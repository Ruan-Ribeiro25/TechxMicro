<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Leitos Hospitalares - VidaPlus</title>
    
    <th:block th:replace="~{fragments/favicon :: icone}"></th:block>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/leitos.css}">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background-color: #f4f7f6;">

    <div th:replace="~{fragments/header :: navbar}"></div>

    <main class="container-fluid mt-4" style="max-width: 1600px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <a th:href="@{/admin/painel}" class="text-white me-4" style="font-size: 1.5rem; text-decoration: none; transition: transform 0.2s;" title="Voltar" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h2 class="mb-0 text-white" style="font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">
                        <i class="fas fa-procedures"></i> Central de Leitos
                    </h2>
                    <small class="text-white-50" style="font-size: 0.9rem; font-weight: 500;">
                        Monitoramento em Tempo Real de Ocupação e Status
                    </small>
                </div>
            </div>
            
            <div>
                <span class="badge bg-white text-dark border-0 shadow-sm p-2" style="font-size: 0.9rem;">
                    <i class="fas fa-clock text-secondary me-1"></i> Atualizado: <span id="clock" class="fw-bold">00:00</span>
                </span>
            </div>
        </div>

        <div class="kpi-row">
            <div class="kpi-card-leito kpi-total">
                <div class="kpi-text">
                    <h3 th:text="${totalLeitos}">0</h3>
                    <p>Total de Leitos</p>
                </div>
                <i class="fas fa-hospital kpi-icon"></i>
            </div>
            
            <div class="kpi-card-leito kpi-ocupado">
                <div class="kpi-text">
                    <h3 th:text="${ocupados}">0</h3>
                    <p>Ocupados</p>
                </div>
                <i class="fas fa-user-injured kpi-icon"></i>
            </div>

            <div class="kpi-card-leito kpi-disponivel">
                <div class="kpi-text">
                    <h3 th:text="${disponiveis}">0</h3>
                    <p>Disponíveis</p>
                </div>
                <i class="fas fa-check-circle kpi-icon"></i>
            </div>

            <div class="kpi-card-leito kpi-limpeza">
                <div class="kpi-text">
                    <h3 th:text="${higienizacao}">0</h3>
                    <p>Higienização</p>
                </div>
                <i class="fas fa-broom kpi-icon"></i>
            </div>

            <div class="kpi-card-leito kpi-alta">
                <div class="kpi-text">
                    <h3 th:text="${altaPrevista}">0</h3>
                    <p>Alta Prevista</p>
                </div>
                <i class="fas fa-file-medical-alt kpi-icon"></i>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-header">
                    <h5><i class="fas fa-chart-pie me-2"></i> Distribuição por Status</h5>
                </div>
                <div style="height: 250px;">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <div class="chart-header">
                    <h5><i class="fas fa-chart-bar me-2"></i> Ocupação por Ala</h5>
                </div>
                <div style="height: 250px;">
                    <canvas id="alaChart"></canvas>
                </div>
            </div>
        </div>

        <div th:each="entry : ${leitosPorAla}" class="ward-section">
            <div class="ward-header">
                <div class="ward-title">
                    <i class="fas fa-layer-group text-primary"></i>
                    <span th:text="${entry.key}">Nome da Ala</span>
                </div>
                <span class="badge bg-secondary" th:text="${#lists.size(entry.value)} + ' Leitos'"></span>
            </div>

            <div class="bed-grid">
                <div th:each="leito : ${entry.value}" 
                     th:class="'bed-card bed-' + ${leito.status}"
                     th:title="'Status: ' + ${leito.status}">
                    
                    <div class="bed-top">
                        <span class="bed-number" th:text="${leito.numero}">001</span>
                        <i th:if="${leito.status == 'DISPONIVEL'}" class="fas fa-check bed-icon"></i>
                        <i th:if="${leito.status == 'OCUPADO'}" class="fas fa-user-injured bed-icon"></i>
                        <i th:if="${leito.status == 'HIGIENIZACAO'}" class="fas fa-pump-soap bed-icon"></i>
                        <i th:if="${leito.status == 'MANUTENCAO'}" class="fas fa-tools bed-icon"></i>
                        <i th:if="${leito.status == 'ALTA_PREVISTA'}" class="fas fa-door-open bed-icon"></i>
                    </div>

                    <div class="bed-content">
                        <div th:if="${leito.status == 'OCUPADO' or leito.status == 'ALTA_PREVISTA'}" class="patient-info">
                            <span class="patient-name" th:text="${leito.paciente}">Nome do Paciente</span>
                            <span class="patient-details">
                                <i class="fas fa-venus-mars"></i> <span th:text="${leito.sexo}"></span> • 
                                <span th:text="${leito.idade} + ' anos'"></span>
                            </span>
                            <span class="patient-details mt-1">
                                <i class="fas fa-user-md"></i> <span th:text="${leito.medico}"></span>
                            </span>
                            <span class="patient-details">
                                <i class="fas fa-calendar-alt"></i> Ent: <span th:text="${leito.entrada}"></span>
                            </span>
                        </div>

                        <div th:if="${leito.status == 'DISPONIVEL'}" class="patient-info text-center pt-2">
                            <span>LIVRE</span>
                        </div>
                        
                        <div th:if="${leito.status == 'HIGIENIZACAO'}" class="patient-info text-center pt-2 text-warning">
                            <span>LIMPEZA</span>
                        </div>
                    </div>

                    <div class="bed-status-strip"></div>
                </div>
            </div>
        </div>

    </main>

    <div th:replace="~{fragments/footer :: rodape}"></div>

    <script th:inline="javascript">
        // Dados vindos do Controller
        const dadosStatus = /*[[${dadosStatus}]]*/ [10, 20, 5, 2, 3]; // Ocupado, Livre, Limpeza, Manut, Alta
        const dadosAlas = /*[[${dadosAlas}]]*/ [5, 8, 2, 1]; // Ocupação por Ala

        document.addEventListener("DOMContentLoaded", function() {
            // Relógio
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }, 1000);

            // Gráfico de Status (Doughnut)
            new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Ocupado', 'Disponível', 'Higienização', 'Manutenção', 'Alta Prevista'],
                    datasets: [{
                        data: dadosStatus,
                        backgroundColor: ['#e74c3c', '#2ecc71', '#f1c40f', '#95a5a6', '#3498db'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right' } },
                    cutout: '60%'
                }
            });

            // Gráfico de Alas (Bar)
            new Chart(document.getElementById('alaChart'), {
                type: 'bar',
                data: {
                    labels: ['UTI', 'Internação', 'Pediatria', 'Cirúrgica'],
                    datasets: [{
                        label: 'Leitos Ocupados',
                        data: dadosAlas,
                        backgroundColor: '#34495e',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        });
    </script>
</body>
</html>
