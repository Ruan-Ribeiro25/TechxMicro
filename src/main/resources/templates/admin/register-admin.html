<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Admin - TechxMicro</title>
    <th:block th:replace="~{fragments/favicon :: icone}"></th:block>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #ffffff; color: #000000;">
    
    <div th:replace="~{fragments/header :: navbar}"></div>

    <main>
        <div class="register-size" style="border-top: 4px solid #b6d441; background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 40px auto; max-width: 700px;">
            
            <div class="login-header text-center">
                <h2 style="color: #b6d441;"><i class="fas fa-laptop-code"></i> Ativação de Perfil Admin</h2>
                <p style="color: #666666;">Vincule suas credenciais à sua conta existente</p>
            </div>

            <div th:if="${error}" class="alert-box alert-error" style="background-color: #fee2e2; color: #991b1b; padding: 10px; text-align: center; border-radius: 5px; margin-bottom: 20px;">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register-admin}" th:object="${usuario}" method="post">
                
                <div class="role-selector" style="margin-bottom: 20px;">
                    <div class="role-option">
                        <input type="radio" name="tipoProfissional" id="tipoAdmin" value="ADMIN" checked onclick="mudarTipo('ADMIN')" style="accent-color: #b6d441;">
                        <label for="tipoAdmin" style="color: #000000; font-weight: bold;"><i class="fas fa-user-shield" style="color: #f07d35;"></i> Administrador de TI</label>
                    </div>
                </div>

                <h4 style="border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; color: #f07d35;">
                    Seus Dados (Confirmados)
                </h4>
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="color: #000000; font-weight: 500;">Nome Completo</label>
                    <input type="text" th:field="*{nome}" class="form-control input-locked" style="background-color: #f8f9fa; border: 1px solid #ddd; width: 100%; padding: 10px; border-radius: 5px;" readonly>
                </div>

                <div class="row-aligned" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div class="col-half">
                        <label style="color: #000000; font-weight: 500;">CPF</label>
                        <input type="text" th:field="*{cpf}" class="form-control input-locked" style="background-color: #f8f9fa; border: 1px solid #ddd; width: 100%; padding: 10px; border-radius: 5px;" readonly>
                    </div>
                    <div class="col-half">
                        <label style="color: #000000; font-weight: 500;">Data de Nascimento</label>
                        <input type="date" th:field="*{dataNascimento}" class="form-control input-locked" style="background-color: #f8f9fa; border: 1px solid #ddd; width: 100%; padding: 10px; border-radius: 5px;" readonly>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="color: #000000; font-weight: 500;">E-mail Institucional</label>
                    <input type="email" th:field="*{email}" class="form-control input-locked" style="background-color: #f8f9fa; border: 1px solid #ddd; width: 100%; padding: 10px; border-radius: 5px;" readonly>
                </div>

                <div class="form-group mt-15" style="margin-bottom: 15px;">
                    <label style="color: #000000; font-weight: 500;">Polo de Atuação (Vinculado)</label>
                    <input type="text" th:field="*{cidade}" class="form-control input-locked" style="font-weight: bold; color: #000000; background-color: #f8f9fa; border: 1px solid #ddd; width: 100%; padding: 10px; border-radius: 5px;" readonly>
                    <small style="color: #f07d35; font-style: italic; display: block; margin-top: 5px;">* Este dado vem do seu cadastro principal.</small>
                </div>

                <h4 style="border-bottom: 2px solid #b6d441; padding-bottom: 10px; margin: 30px 0 20px 0; color: #b6d441;">
                    <i class="fas fa-id-card-alt"></i> Dados Profissionais (Completar)
                </h4>

                <div class="row-aligned" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div class="col-half">
                        <label style="color: #000000; font-weight: 500;">Matrícula Interna</label>
                        <input type="text" name="matricula" class="form-control" placeholder="Ex: PIXEL-001" required style="border-left: 4px solid #b6d441; width: 100%; padding: 10px; border: 1px solid #ddd; border-left-width: 4px; border-radius: 5px;">
                    </div>
                    <div class="col-half">
                        <label style="color: #000000; font-weight: 500;">Data da Matrícula (Admissão)</label>
                        <input type="date" name="dataMatricula" class="form-control" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="color: #000000; font-weight: 500;">Área de Atuação em Tecnologia</label>
                    <select name="cargo" id="especialidadeSelect" class="form-control" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;">
                        <option value="" disabled selected>Carregando áreas...</option>
                    </select>
                </div>
                
                <br>
                <button type="submit" class="btn-custom mt-20" style="width: 100%; padding: 16px; font-size: 1.1rem; background-color: #b6d441; color: #ffffff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">
                    Confirmar Vínculo Profissional
                </button>
            </form>
            <br>
            
            <div class="footer-links text-center mt-3" style="text-align: center;">
                <a th:href="@{/home}" style="font-weight: bold; text-decoration: none; color: #f07d35; transition: 0.3s;">
                    <i class="fas fa-arrow-left"></i> Cancelar e Voltar
                </a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: rodape}"></div>

    <script>
        const areasTI = [
            "Infraestrutura e Redes", "Desenvolvimento de Software", 
            "Suporte Técnico (Helpdesk)", "Segurança da Informação", 
            "Banco de Dados (DBA)", "Gestão de TI"
        ];

        // Se futuramente quiser adicionar mais tipos de usuários no rádio
        const areasGestao = [
            "Diretoria", "Gerência de Projetos", "Product Owner"
        ];

        function mudarTipo(tipo) {
            const select = document.getElementById('especialidadeSelect');
            let lista = [];

            if (tipo === 'ADMIN') {
                lista = areasTI;
            } else if (tipo === 'GESTAO') {
                lista = areasGestao;
            } else {
                lista = areasTI; // Prevenção de falhas
            }

            select.innerHTML = '<option value="" disabled selected>Selecione sua Área...</option>';
            
            lista.forEach(esp => {
                const option = document.createElement('option');
                option.value = esp;
                option.text = esp;
                select.appendChild(option);
            });
        }

        window.onload = function() {
            mudarTipo('ADMIN'); // Carrega a lógica de TI ao iniciar
        };
    </script>
</body>
</html>
