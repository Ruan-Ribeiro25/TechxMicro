<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${moduloNome} + ' - TechxMicro'"></title>
    <th:block th:replace="~{fragments/favicon :: icone}"></th:block>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .construction-container {
            max-width: 600px; margin: 60px auto; background: var(--tm-white);
            border-radius: 15px; padding: 50px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Sombra ajustada para fundo escuro */
            border-top: 6px solid var(--tm-dark-green);
        }
        .icon-wrapper { 
            font-size: 5rem; color: var(--tm-black); margin-bottom: 20px; 
            position: relative; display: inline-block; 
        }
        .gear-icon { 
            position: absolute; bottom: -10px; right: -20px; 
            font-size: 3rem; color: var(--tm-dark-green); 
            animation: spin 4s linear infinite; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .btn-voltar { 
            background: var(--tm-dark-green); color: var(--tm-white); padding: 12px 30px; 
            border-radius: 8px; font-weight: bold; text-decoration: none; 
            display: inline-block; transition: 0.3s; margin-top: 15px;
            border: none;
        }
        .btn-voltar:hover { 
            background: var(--tm-light-green); color: var(--tm-black); transform: translateY(-3px); 
            box-shadow: 0 4px 10px rgba(172, 254, 159, 0.4); 
        }
    </style>
</head>
<body>
    
    <div th:replace="~{fragments/header :: navbar}"></div>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <div class="construction-container">
            <div class="icon-wrapper">
                <i th:class="'fas ' + ${moduloIcone}"></i>
                <i class="fas fa-cog gear-icon"></i>
            </div>
            
            <h2 th:text="${moduloNome}" style="color: var(--tm-black); font-weight: 800; margin-bottom: 10px;">Módulo</h2>
            <h4 style="color: var(--tm-dark-green); margin-bottom: 20px;">Em Desenvolvimento <i class="fas fa-hard-hat"></i></h4>
            
            <p th:text="${moduloDesc}" style="color: #555555; font-size: 1.1rem; margin-bottom: 30px; font-weight: 500;"></p>
            
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid var(--tm-brown); margin-bottom: 30px; text-align: left; font-size: 0.9rem; color: var(--tm-black);">
                <strong><i class="fas fa-info-circle" style="color: var(--tm-brown);"></i> Status de Engenharia:</strong> A nossa equipe de desenvolvimento está estruturando esta funcionalidade para o próximo grande lançamento do ecossistema TechxMicro.
            </div>
            
            <a th:href="@{/home}" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao Painel</a>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: rodape}"></div>
</body>
</html>
