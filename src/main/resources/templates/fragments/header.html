<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="manifest" th:href="@{/manifest.json}">
<meta name="theme-color" content="#000000">
<body>
    <nav th:fragment="navbar" id="main-navbar" class="navbar" style="background-color: #000000; padding: 15px 30px; border-bottom: 2px solid #b6d441; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; font-family: 'Segoe UI', sans-serif; -webkit-app-region: drag; z-index: 1000; position: relative;">
        
        <div class="logo" style="-webkit-app-region: no-drag;">
            <a th:href="@{/home}" style="text-decoration: none; display: flex; align-items: center;">
                <img th:src="@{/img/LogoSite.V1.White.png}" alt="PIXEL TI" style="height: 35px;">
            </a>
        </div>

        <div class="menu" style="display: flex; align-items: center; gap: 25px; -webkit-app-region: no-drag;">
            
            <a th:href="@{/home}" style="text-decoration: none; color: #ffffff; background-color: #f07d35; padding: 8px 25px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; box-shadow: 0 4px 10px rgba(240, 125, 53, 0.3);">
                <i class="fas fa-home"></i> Home
            </a>

            <span style="color: #ffffff; font-size: 1rem; font-weight: 500;">
                Olá, <strong th:text="${usuario != null ? usuario.nome : (paciente != null ? paciente.nome : 'Visitante')}" style="color: #f07d35; font-weight: 800;">Usuário</strong>
            </span>

            <a th:href="@{/logout}" style="text-decoration: none; color: #ffffff; font-weight: 600; border: 1px solid #555; padding: 8px 25px; border-radius: 50px; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-sign-out-alt" style="color: #b6d441;"></i> Sair
            </a>

        </div>

        <script th:inline="javascript">
            document.addEventListener("DOMContentLoaded", function() {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(function(position) {
                        const dadosGeo = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        };

                        fetch('/api/geo/check-in', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(dadosGeo)
                        })
                        .then(response => response.text())
                        .then(msg => {
                            if(msg && msg.startsWith("UPDATE")) {
                                console.log("PIXEL TI: Novo polo detectado. Atualizando contexto...");
                                window.location.reload();
                            }
                        })
                        .catch(err => console.warn("PIXEL TI Geo: Acesso à localização ignorado ou erro de API.", err));
                    }, function(error) {
                        console.log("PIXEL TI: Geolocalização não permitida pelo usuário.");
                    });
                }
            });
        </script>

        <script>
            // Atualiza o conteúdo visual da navbar a cada 1 segundo sem piscar
            setInterval(async function() {
                try {
                    if (document.querySelector('.menu:hover')) return;

                    const response = await fetch(window.location.href);
                    if (response.ok) {
                        const html = await response.text();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        
                        const novaNavbar = doc.getElementById('main-navbar');
                        const navbarAtual = document.getElementById('main-navbar');

                        if (novaNavbar && navbarAtual) {
                            const novoMenu = novaNavbar.querySelector('.menu');
                            const menuAtual = navbarAtual.querySelector('.menu');
                            if (novoMenu && menuAtual && novoMenu.innerHTML !== menuAtual.innerHTML) {
                                menuAtual.innerHTML = novoMenu.innerHTML;
                            }
                        }
                    }
                } catch (e) {}
            }, 1000);
        </script>

        <script>
            let tempoInativo;

            // Função que encerra a sessão e manda para o login
            function realizarLogout() {
                console.log("PIXEL TI: Inatividade de 5 minutos detectada. Encerrando sessão por segurança...");
                window.location.href = '/logout';
            }

            // Função que zera o cronómetro sempre que há atividade humana
            function zerarCronometro() {
                clearTimeout(tempoInativo);
                // 5 minutos = 5 * 60 * 1000 milissegundos = 300000
                tempoInativo = setTimeout(realizarLogout, 300000); 
            }

            // Observadores de atividade do utilizador (Rato, Teclado, Toque na tela, Scroll)
            window.onload = zerarCronometro;
            document.onmousemove = zerarCronometro;
            document.onkeypress = zerarCronometro;
            document.ontouchstart = zerarCronometro; 
            document.onclick = zerarCronometro;
            document.onscroll = zerarCronometro;
        </script>
    </nav>
</body>
</html>
