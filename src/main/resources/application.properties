server.port=8080

# --- BANCO DE DADOS HÍBRIDO ---
# Se DB_HOST năo existir, usa localhost. Se DB_PORT năo existir, usa 3306.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/techxmicro_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- THYMELEAF ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- UPLOAD ---
techxmicro.upload.dir=${UPLOAD_DIR:./uploads_techxmicro}

# --- EMAIL ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=techxmicro@gmail.com
spring.mail.password=hmgw vcoj wrng ozio
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- PROMETHEUS / ACTUATOR ---
management.endpoints.web.exposure.include=*

# --- SEGURANÇA (CLOUDFLARE) ---
server.forward-headers-strategy=framework
server.tomcat.remote-ip-header=x-forwarded-for
server.tomcat.protocol-header=x-forwarded-proto

# --- SESSĂO ---
server.servlet.session.timeout=5m