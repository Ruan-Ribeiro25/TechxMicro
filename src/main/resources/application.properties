server.port=8080

# --- BANCO DE DADOS (CONFIGURAÇĂO HÍBRIDA) ---
# Lógica: Tenta pegar a variável de ambiente DB_HOST. Se năo existir, usa 'localhost'.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:helpdesk_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- THYMELEAF ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# --- UPLOAD ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- EMAIL ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ticpixelti@gmail.com
spring.mail.password=henc fjhb ndxz andr
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- PROMETHEUS ---
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Caminho interno do container (que o Docker mapeou para o SSD)
pixelti.upload.dir=/app/uploads

# Inserindo Aplicativo
server.forward-headers-strategy=framework