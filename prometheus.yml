global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'techxmicro-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # 'techxmicro-app' é o nome do container. 
      # Ele vai direto na porta 8080 INTERNA dele, sem passar pela porta do seu host.
      - targets: ['techxmicro-app:8080']